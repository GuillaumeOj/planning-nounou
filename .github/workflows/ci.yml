name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nounou
          POSTGRES_PASSWORD: nounou
          POSTGRES_DB: nounou
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://nounou:nounou@localhost:5432/nounou

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Pinned in backend/.python-version; keep uv's env in sync.
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Import sorting (ruff, isort rules)
        run: uv run ruff check --select I .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      # Coverage threshold (>= 90%) is enforced via --cov-fail-under in pyproject.toml.
      - name: Tests + coverage
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx biome check .

      - name: Type check
        run: bun run typecheck

      # Coverage thresholds (>= 90%) are enforced in vite.config.ts.
      - name: Tests + coverage
        run: bun run coverage
