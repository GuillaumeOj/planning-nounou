[project]
name = "backend"
version = "0.1.0"
description = "Ma Garde Sereine backend — nanny hours tracker (Django + DRF)"
requires-python = ">=3.13"
dependencies = [
    "django==6.0.6",
    "django-anymail[brevo]==15.0",
    "django-cors-headers==4.9.0",
    "django-environ==0.14.0",
    "djangorestframework==3.17.1",
    "djangorestframework-simplejwt==5.5.1",
    "djoser==2.3.3",
    "drf-spectacular==0.28.0",
    "gunicorn==26.0.0",
    "psycopg[binary]==3.3.4",
    "whitenoise==6.12.0",
]

[dependency-groups]
dev = [
    "django-stubs==6.0.6",
    "djangorestframework-stubs==3.17.0",
    "pytest==9.1.1",
    "pytest-cov==7.1.0",
    "pytest-django==4.12.0",
    "ruff==0.15.20",
    "tox==4.56.1",
    "tox-uv==1.35.2",
    "ty==0.0.56",
]

# The Vercel build step (collectstatic + deploy migrations) is wired via the backend
# service's buildCommand in vercel.json, which requires framework: "django" to engage the
# Django build pipeline. A vercel.json buildCommand takes precedence over a
# [tool.vercel.scripts] hook here, so this file intentionally defines no build script.

[tool.ruff]
line-length = 100
target-version = "py313"
# Auto-generated migrations are not hand-edited and often exceed line limits.
extend-exclude = ["**/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = "--cov=accounts --cov=children --cov=nannies --cov=contracts --cov=reference --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
# Migrations are generated by Django and not meaningfully unit-testable.
omit = ["*/migrations/*"]

[tool.ty.environment]
python-version = "3.13"

[tool.ty.src]
# Type-check the whole backend; build/cache dirs are already git-ignored.
exclude = [".venv", ".tox", "staticfiles"]
