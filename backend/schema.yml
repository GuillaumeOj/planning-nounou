      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyContractInvitation'
          description: ''
  /contract-invitations/{token}/:
    get:
      operationId: contract_invitations_retrieve
      description: Public, token-addressed preview for the invite landing page.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - contract-invitations
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractInvitationPreview'
          description: ''
  /contract-invitations/{token}/accept/:
    post:
      operationId: contract_invitations_accept_create
      description: Accept a contract invitation, attaching a family the user owns.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - contract-invitations
      requestBody:
