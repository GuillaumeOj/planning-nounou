  /families/{family_pk}/contracts/{contract_pk}/children/:
    get:
      operationId: families_contracts_children_list
      description: |-
        Which children a contract covers, and the hours they are there.

        Contract-wide for reads and writes, like the schedule it describes: the
        families agree the arrangement jointly, and one family's windows change the
        other's declared hours.
      parameters:
      - in: path
        name: contract_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContractChild'
          description: ''
    post:
      operationId: families_contracts_children_create
      description: |-
        Which children a contract covers, and the hours they are there.

        Contract-wide for reads and writes, like the schedule it describes: the
        families agree the arrangement jointly, and one family's windows change the
        other's declared hours.
      parameters:
      - in: path
        name: contract_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - families
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractChildRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContractChildRequest'
