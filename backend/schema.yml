          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        accrued:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        taken:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        remaining:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        tenth:
          allOf:
          - $ref: '#/components/schemas/TenthReconciliation'
          nullable: true
          readOnly: true
      required:
      - period_start
      - period_end
      - total_days
      - accrued
      - taken
      - remaining
      - tenth
