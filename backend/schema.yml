        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractChild'
          description: ''
  /families/{family_pk}/contracts/{contract_pk}/children/{id}/:
    get:
      operationId: families_contracts_children_retrieve
      description: |-
        Which children a contract covers, and the hours they are there.

        Contract-wide for reads and writes, like the schedule it describes: the
