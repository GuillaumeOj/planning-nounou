    RecentDeclaration:
      type: object
      description: |-
        One month's declaration summary on the dashboard: which month, what the
        nanny is paid, and whether it has been filed.

        Documentation-only — the dicts are built in the dashboard view (recomputed
        via ``declarations_for`` and narrowed to the acting family's row). ``status``
        reuses ``MonthlyDeclaration.Status`` so it shares the schema's declaration
        status enum rather than minting a second one.
      properties:
        month:
          type: string
          readOnly: true
          description: The month as YYYY-MM.
        net_salary:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/MonthlyDeclarationStatusEnum'
          readOnly: true
      required:
      - month
      - net_salary
      - status
    Register:
      type: object
      description: |-
        djoser's user-create serializer, extended for our two custom needs:

        case-insensitive-unique email (with our i18n message) and the optional
        ``invitation_token`` that joins the new account to the invited family on
        creation. Password validation and the inactive-until-activated handling are
        inherited from djoser.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - id
      - email
      - first_name
      - last_name
    RegisterRequest:
      type: object
      description: |-
        djoser's user-create serializer, extended for our two custom needs:

        case-insensitive-unique email (with our i18n message) and the optional
        ``invitation_token`` that joins the new account to the invited family on
        creation. Password validation and the inactive-until-activated handling are
        inherited from djoser.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        invitation_token:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    RoleEnum:
      enum:
      - owner
      - member
      type: string
      description: |-
        * `owner` - Owner
        * `member` - Member
    ScheduleBlock:
