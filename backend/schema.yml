      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        leave_type:
          $ref: '#/components/schemas/LeaveTypeEnum'
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        portion:
          $ref: '#/components/schemas/PortionEnum'
        hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
          nullable: true
        notes:
          type: string
      required:
      - id
      - leave_type
      - start_date
      - end_date
      - portion
      - hours
      - notes
    LeaveRequest:
      type: object
