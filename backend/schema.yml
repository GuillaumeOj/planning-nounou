      description: |-
        The five numbers pajemploi asks for, and where they came from.

        Almost everything is read-only: it is computed, not typed. ``kilometers`` is
        the exception — mileage_rate's missing operand, which only a parent knows.
      properties:
        kilometers:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
    PatchedProfileRequest:
      type: object
      description: |-
        Read the profile and update the user's names.

        Email is read-only here; it is changed through the dedicated email
        endpoint, which requires the current password.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
    Planning:
      type: object
      description: |-
        The Planning calendar payload: the acting family's contracts with their
        full histories, and the bank holidays falling in the month's calendar grid.
      properties:
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/PlanningContract'
          readOnly: true
        holidays:
          type: array
          items:
            $ref: '#/components/schemas/BankHoliday'
          readOnly: true
      required:
      - contracts
      - holidays
    PlanningContract:
      type: object
      description: |-
        A contract with the full per-contract history the Planning calendar draws
        from: every schedule version, leave, child and the acting family's visible
        exceptional hours / presences.

        ``exceptional_hours`` mirrors the list endpoint — the acting family's own
        rows plus every family's shared ones — via a filtered prefetch attached to
        the instance as ``visible_exceptional_hours``. The other collections read the
        prefetched related managers directly.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nanny:
          allOf:
          - $ref: '#/components/schemas/NannyBrief'
          readOnly: true
        starting_date:
          type: string
          format: date
        ending_date:
          type: string
          format: date
          nullable: true
        split_method:
          $ref: '#/components/schemas/SplitMethodEnum'
        paid_leave_days:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
        families:
          type: array
          items:
            $ref: '#/components/schemas/ContractFamily'
          readOnly: true
        current_terms:
          allOf:
          - $ref: '#/components/schemas/ContractTerms'
          nullable: true
          readOnly: true
        current_schedule:
          allOf:
          - $ref: '#/components/schemas/ContractSchedule'
          nullable: true
          readOnly: true
        schedule_history:
          type: array
          items:
            $ref: '#/components/schemas/ContractSchedule'
          readOnly: true
        leaves:
          type: array
          items:
            $ref: '#/components/schemas/Leave'
          readOnly: true
        exceptional_hours:
          type: array
          items:
            $ref: '#/components/schemas/ExceptionalHours'
          readOnly: true
        exceptional_presences:
          type: array
          items:
            $ref: '#/components/schemas/ExceptionalPresence'
          readOnly: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/ContractChild'
          readOnly: true
      required:
      - id
      - nanny
      - starting_date
      - ending_date
      - split_method
      - paid_leave_days
      - notes
      - families
      - current_terms
      - current_schedule
      - schedule_history
      - leaves
      - exceptional_hours
      - exceptional_presences
      - children
    PortionEnum:
