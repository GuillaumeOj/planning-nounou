          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
          nullable: true
        notes:
          type: string
      required:
      - end_date
      - leave_type
      - start_date
    LeaveTypeEnum:
      enum:
      - paid
      - unpaid
      - sickness
      - maternity
      type: string
      description: |-
        * `paid` - Paid leave
        * `unpaid` - Unpaid leave
        * `sickness` - Sickness leave
        * `maternity` - Maternity leave
    MinimumWage:
      type: object
      description: |-
        Response shape for the minimum-wage lookup: the recommended net hourly rate
