    Simulation:
      type: object
      description: |-
        The payment-simulation payload: the window it covers, and every contract the
        acting family shares with its month-by-month projection of what the family pays.
      properties:
        period_start:
          type: string
          format: date
          readOnly: true
        period_end:
          type: string
          format: date
          readOnly: true
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/SimulationContract'
          readOnly: true
      required:
      - period_start
      - period_end
      - contracts
    SimulationContract:
      type: object
      description: |-
        A contract with its month-by-month payment simulation for the acting family.

        ``months`` (built in the view and attached as ``simulation_months``) is the per-month
        breakdown; ``total`` is what the family pays across the whole window — the footer of
        the detail table and the height of a contract's stack on the graph. Only the months
        the contract was live for appear, so a chart draws no bar where there is no contract.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nanny:
          allOf:
          - $ref: '#/components/schemas/NannyBrief'
          readOnly: true
        starting_date:
          type: string
          format: date
        ending_date:
          type: string
          format: date
          nullable: true
        split_method:
          $ref: '#/components/schemas/SplitMethodEnum'
        paid_leave_days:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
        families:
          type: array
          items:
            $ref: '#/components/schemas/ContractFamily'
          readOnly: true
        current_terms:
          allOf:
          - $ref: '#/components/schemas/ContractTerms'
          nullable: true
          readOnly: true
        current_schedule:
          allOf:
          - $ref: '#/components/schemas/ContractSchedule'
          nullable: true
          readOnly: true
        months:
          type: array
          items:
            $ref: '#/components/schemas/SimulationMonth'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - nanny
      - starting_date
      - ending_date
      - split_method
      - paid_leave_days
      - notes
      - families
      - current_terms
      - current_schedule
      - months
      - total
    SimulationMonth:
      type: object
      description: |-
        One month of the payment simulation: which month, each component the acting
        family pays, and their total.

        Documentation-only — the dicts are built in the view from
        :class:`contracts.declarations_repo.SimulatedMonth`. Decimals are strings (the whole
        engine's money convention) so no float rounding creeps in on the way to the client.
        ``paid_leave_rappel`` is zero every month but a reference period's close; ``total``
        is the sum of every other field — the figure the graph plots and the table foots.
      properties:
        month:
          type: string
          readOnly: true
          description: The month as YYYY-MM.
        net_wage:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        transport:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        mileage:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        benefits_in_kind:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        paid_leave_rappel:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - month
      - net_wage
      - transport
      - mileage
      - benefits_in_kind
      - paid_leave_rappel
      - total
    Source:
      type: object
      description: 'A citation: what the rule is called, where it lives, and what
        it says.'
      properties:
        ref:
          type: string
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        quote:
          type: string
          readOnly: true
      required:
      - ref
      - url
      - quote
    SplitMethodEnum:
      enum:
      - equal
      - by_children
      type: string
      description: |-
        * `equal` - Equally between the families present
        * `by_children` - In proportion to the children present
    TenthReconciliation:
      type: object
      description: |-
        A contract's congés-payés « rappel de 1/10 » estimate for the reference period.

        Not a model: computed on the fly by :mod:`contracts.paid_leave_tenth`. The figures
        are brut, as art. L3141-24 frames the comparison; ``rappel_net`` is the top-up as it
        would actually be declared and paid. A running estimate on the dashboard — it is
        only settled, and written onto a declaration, on the period's closing month.
      properties:
        period_start:
          type: string
          format: date
          readOnly: true
        period_end:
          type: string
          format: date
          readOnly: true
        assiette_brut:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        tenth_brut:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        maintien_brut:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        rappel_brut:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        rappel_net:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - period_start
      - period_end
      - assiette_brut
      - tenth_brut
      - maintien_brut
      - rappel_brut
      - rappel_net
