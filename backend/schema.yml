      responses:
        '204':
          description: No response body
  /families/:
    get:
      operationId: families_list
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Family'
          description: ''
    post:
      operationId: families_create
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      tags:
      - families
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyRequest'
          application/x-www-form-urlencoded:
            schema:
