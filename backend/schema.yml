  /families/{family_pk}/contracts/{contract_pk}/declarations/:
    get:
      operationId: families_contracts_declarations_list
      description: |-
        What the acting family declares to pajemploi for a month.

        Listing recomputes *every* family's draft from live data — the split is one
        calculation over the nanny's whole month, and B's row would go stale if only
        A's were rebuilt — but returns only the acting family's. What B pays her is
        B's. A filed declaration is the record of what was actually sent and is
        returned untouched.

        Only `kilometers` is writable: everything else is computed.
      parameters:
      - in: path
        name: contract_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: month
        schema:
          type: string
        description: Month as YYYY-MM. Defaults to the current month.
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonthlyDeclaration'
          description: ''
