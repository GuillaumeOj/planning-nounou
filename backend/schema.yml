    get:
      operationId: families_planning_retrieve
      description: |-
        The Planning calendar for the acting family, in one response.

        Each shared contract carries its full schedule history, leaves, children and
        the exceptional hours / presences visible to the acting family (its own rows
        plus every family's shared care, as the list endpoints return them). Bank
        holidays cover the month's whole-weeks calendar grid. The client picks the
        schedule version in force for each day from the history.
      parameters:
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: month
        schema:
          type: string
        description: Month as YYYY-MM. Defaults to the current month.
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Planning'
          description: ''
  /families/{family_pk}/simulation/:
    get:
      operationId: families_simulation_retrieve
      description: |-
        The payment simulation for the acting family, in one response.

        Every shared contract comes back with a month-by-month projection of what the
        family pays — the net wage, the transport and kilométrage, the benefits in kind
        and, on a reference period's closing month, the congés-payés « rappel de 1/10 »
        top-up — over the requested window (the current année de référence, 1 June–31 May,
        by default). The same figures the declarations endpoint computes, summed into one
        outlay per month and narrowed to the acting family's share.
      parameters:
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: from
        schema:
          type: string
        description: First month of the window as YYYY-MM. Defaults to the current
          reference period's start (1 June).
      - in: query
        name: to
        schema:
          type: string
        description: Last month of the window as YYYY-MM. Defaults to the current
          reference period's end (31 May), or eleven months after `from`.
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
          description: ''
  /families/{id}/:
    get:
      operationId: families_retrieve
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this family.
        required: true
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
          description: ''
    put:
      operationId: families_update
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this family.
        required: true
      tags:
      - families
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FamilyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FamilyRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
          description: ''
    patch:
      operationId: families_partial_update
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this family.
        required: true
      tags:
      - families
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedFamilyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFamilyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFamilyRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
          description: ''
    delete:
      operationId: families_destroy
      description: |-
        CRUD for families the user can access.

        Reads and ``leave`` are open to any member; editing and deleting require
        manage rights (owner, or creator of an unclaimed family).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this family.
        required: true
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /families/{id}/leave/:
    post:
      operationId: families_leave_create
      description: Remove yourself from a family. The sole owner cannot leave.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this family.
        required: true
      tags:
      - families
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness probe used by deploy health checks. Public — no auth required.
      tags:
      - health
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
          description: ''
  /holidays/:
    get:
      operationId: holidays_list
      description: |-
        The national work-free days (jours fériés), optionally filtered by ``?year=``.

        Global and admin-managed: read-only over the API. The planning uses these to
        label days and drop the nannies' working blocks on non-workable holidays.
      parameters:
      - in: query
        name: year
        schema:
          type: integer
        description: Restrict to holidays falling in this calendar year.
      tags:
      - holidays
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankHoliday'
          description: ''
  /invitations/:
    get:
      operationId: invitations_list
      description: |-
        Pending invitations addressed to the requesting user's email — the inbox
        that surfaces claims to an already-registered user when they log in.
      tags:
      - invitations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyInvitation'
          description: ''
  /invitations/{token}/:
    get:
      operationId: invitations_retrieve
      description: Public, token-addressed preview for the invite landing page.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - invitations
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationPreview'
          description: ''
  /invitations/{token}/accept/:
    post:
      operationId: invitations_accept_create
      description: Accept an invitation as the logged-in user, joining the family.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - invitations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
          description: ''
  /invitations/{token}/decline/:
    post:
      operationId: invitations_decline_create
      description: Decline an invitation as the logged-in user.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - invitations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /minimum-wage/:
    get:
      operationId: minimum_wage_retrieve
      description: |-
        The recommended net-hourly minimum in force on a given date (?on=YYYY-MM-DD,
        default today). Lets the client warn when a rate is below the minimum for the
        *effective* date it is entered for.
      parameters:
      - in: query
        name: 'on'
        schema:
          type: string
          format: date
        description: Date (YYYY-MM-DD) the value must be in force on. Defaults to
          today.
      tags:
      - minimum-wage
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinimumWage'
          description: ''
  /paid-leave-default/:
    get:
      operationId: paid_leave_default_retrieve
      description: |-
        The default annual paid-leave days in force on a given date (?on=YYYY-MM-DD,
        default today). The contract form pre-fills its ``paid_leave_days`` from it.
      parameters:
      - in: query
        name: 'on'
        schema:
          type: string
          format: date
        description: Date (YYYY-MM-DD) the value must be in force on. Defaults to
          today.
      tags:
      - paid-leave-default
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaidLeaveAllowance'
          description: ''
components:
  schemas:
    AcceptContractInvitationRequestRequest:
      type: object
      properties:
        family_id:
          type: string
          format: uuid
      required:
      - family_id
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - uid
      - token
    ActivationRequest:
      type: object
      properties:
        uid:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
      required:
      - token
      - uid
    AttachFamilyRequestRequest:
      type: object
      properties:
        family_id:
          type: string
          format: uuid
      required:
      - family_id
    BankHoliday:
      type: object
      description: A national work-free day. Read-only over the API (admin-managed).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        is_workable:
          type: boolean
      required:
      - id
      - name
      - date
      - is_workable
    Child:
      type: object
      description: A child of a family; the family is taken from the URL, not the
        payload.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          maxLength: 150
      required:
      - id
      - first_name
    ChildRequest:
      type: object
      description: A child of a family; the family is taken from the URL, not the
        payload.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 150
      required:
      - first_name
    Contract:
      type: object
      description: |-
        A shared nanny contract.

        On create, either reuse an existing ``nanny_id`` (one the acting family
        already works with) or create a person inline from ``first_name``/
        ``last_name``. The originating family is injected by the view.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nanny:
          allOf:
          - $ref: '#/components/schemas/NannyBrief'
          readOnly: true
        starting_date:
          type: string
          format: date
        ending_date:
          type: string
          format: date
          nullable: true
        split_method:
          $ref: '#/components/schemas/SplitMethodEnum'
        paid_leave_days:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
        families:
          type: array
          items:
            $ref: '#/components/schemas/ContractFamily'
          readOnly: true
        current_terms:
          allOf:
          - $ref: '#/components/schemas/ContractTerms'
          nullable: true
          readOnly: true
        current_schedule:
          allOf:
          - $ref: '#/components/schemas/ContractSchedule'
          nullable: true
          readOnly: true
      required:
      - id
      - nanny
      - starting_date
      - ending_date
      - split_method
      - paid_leave_days
      - notes
      - families
      - current_terms
      - current_schedule
    ContractChild:
      type: object
      description: |-
        A child on the contract and the hours they are actually there.

        ``windows`` is nested and written whole, like a schedule's blocks. Sending an
        empty list is not "leave it alone" — it means the child is there whenever the
        nanny is, which is the common case and the default.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        child:
          type: string
          format: uuid
        first_name:
          type: string
          readOnly: true
        family_id:
          type: string
          format: uuid
          readOnly: true
        windows:
          type: array
          items:
            $ref: '#/components/schemas/ContractChildWindow'
      required:
      - id
      - child
      - first_name
      - family_id
      - windows
    ContractChildRequest:
      type: object
      description: |-
        A child on the contract and the hours they are actually there.

        ``windows`` is nested and written whole, like a schedule's blocks. Sending an
        empty list is not "leave it alone" — it means the child is there whenever the
        nanny is, which is the common case and the default.
      properties:
        child:
          type: string
          format: uuid
        windows:
          type: array
          items:
            $ref: '#/components/schemas/ContractChildWindowRequest'
      required:
      - child
    ContractChildWindow:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        weekday:
          allOf:
          - $ref: '#/components/schemas/WeekdayEnum'
          minimum: -2147483648
          maximum: 2147483647
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
      required:
      - id
      - weekday
      - start_time
      - end_time
    ContractChildWindowRequest:
      type: object
      properties:
        weekday:
          allOf:
          - $ref: '#/components/schemas/WeekdayEnum'
          minimum: -2147483648
          maximum: 2147483647
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
      required:
      - end_time
      - start_time
      - weekday
    ContractFamily:
      type: object
      description: |-
        One family attached to a contract. Documentation-only: the values are built as
        plain dicts in ``ContractSerializer.get_families``; this drives the OpenAPI schema so
        the generated frontend type is precise instead of ``object``.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        is_originator:
          type: boolean
          readOnly: true
      required:
      - id
      - name
      - is_originator
    ContractInvitation:
      type: object
      description: |-
        Create/list invitations to share a contract.

        Creating one emails the invitee a Brevo-hosted invite link (see
        contracts/notifications.py). ``token`` stays exposed to the managing family so they
        can re-share the link manually if needed.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        status:
          allOf:
          - $ref: '#/components/schemas/InvitationStatusEnum'
          readOnly: true
        token:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - email
      - status
      - token
      - created_at
      - expires_at
    ContractInvitationPreview:
      type: object
      description: Public, token-addressed view shown on the invite landing page.
      properties:
        email:
          type: string
          format: email
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/InvitationStatusEnum'
          readOnly: true
        nanny_first_name:
          type: string
          readOnly: true
        nanny_last_name:
          type: string
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - email
      - status
      - nanny_first_name
      - nanny_last_name
      - expires_at
    ContractInvitationRequest:
      type: object
      description: |-
        Create/list invitations to share a contract.

        Creating one emails the invitee a Brevo-hosted invite link (see
        contracts/notifications.py). ``token`` stays exposed to the managing family so they
        can re-share the link manually if needed.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
      required:
      - email
    ContractRequest:
      type: object
      description: |-
        A shared nanny contract.

        On create, either reuse an existing ``nanny_id`` (one the acting family
        already works with) or create a person inline from ``first_name``/
        ``last_name``. The originating family is injected by the view.
      properties:
        nanny_id:
          type: string
          format: uuid
          writeOnly: true
        first_name:
          type: string
          writeOnly: true
          minLength: 1
        last_name:
          type: string
          writeOnly: true
          minLength: 1
        starting_date:
          type: string
          format: date
        ending_date:
          type: string
          format: date
          nullable: true
        split_method:
          $ref: '#/components/schemas/SplitMethodEnum'
        paid_leave_days:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
      required:
      - starting_date
    ContractSchedule:
      type: object
      description: An effective-dated weekly schedule; editing creates a new dated
        snapshot.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          nullable: true
          readOnly: true
        weekly_hours:
          type: number
          format: double
          readOnly: true
        edited:
          type: boolean
          readOnly: true
        created_by_name:
          type: string
          nullable: true
          readOnly: true
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleBlock'
      required:
      - id
      - effective_from
      - effective_to
      - weekly_hours
      - edited
      - created_by_name
      - blocks
    ContractScheduleRequest:
      type: object
      description: An effective-dated weekly schedule; editing creates a new dated
        snapshot.
      properties:
        effective_from:
          type: string
          format: date
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleBlockRequest'
      required:
      - blocks
    ContractTerms:
      type: object
      description: |-
        An effective-dated compensation snapshot.

        The net-hourly minimum is a *soft* check: below-minimum values still save,
        but the response carries ``below_minimum`` and a translated ``warnings`` list
        so the client can surface it.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          nullable: true
          readOnly: true
        net_hourly_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        night_presence_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        transport_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        mileage_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,3})?$
        benefits_in_kind:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        minimum_net_hourly_rate:
          type: string
          nullable: true
          readOnly: true
        below_minimum:
          type: boolean
          readOnly: true
        warnings:
          type: array
          items:
            type: string
          readOnly: true
        edited:
          type: boolean
          readOnly: true
        created_by_name:
          type: string
          nullable: true
          readOnly: true
      required:
      - id
      - effective_from
      - effective_to
      - net_hourly_rate
      - night_presence_rate
      - transport_fee
      - mileage_rate
      - benefits_in_kind
      - minimum_net_hourly_rate
      - below_minimum
      - warnings
      - edited
      - created_by_name
    ContractTermsRequest:
      type: object
      description: |-
        An effective-dated compensation snapshot.

        The net-hourly minimum is a *soft* check: below-minimum values still save,
        but the response carries ``below_minimum`` and a translated ``warnings`` list
        so the client can surface it.
      properties:
        effective_from:
          type: string
          format: date
        net_hourly_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        night_presence_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        transport_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        mileage_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,3})?$
        benefits_in_kind:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
      required:
      - net_hourly_rate
    Dashboard:
      type: object
      description: |-
        The Home dashboard payload: every contract the acting family shares, each
        carrying its paid-leave balance and recent declarations.
      properties:
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/DashboardContract'
          readOnly: true
      required:
      - contracts
    DashboardContract:
      type: object
      description: |-
        A contract with the two aggregates the Home dashboard shows beside it: the
        congés-payés balance and the recent months' declarations.

        Both are computed per contract in the view and attached to the instance
        (``dashboard_balance`` / ``dashboard_recent``); the method fields only read
        them, so no query happens during serialization.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nanny:
          allOf:
          - $ref: '#/components/schemas/NannyBrief'
          readOnly: true
        starting_date:
          type: string
          format: date
        ending_date:
          type: string
          format: date
          nullable: true
        split_method:
          $ref: '#/components/schemas/SplitMethodEnum'
        paid_leave_days:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
        families:
          type: array
          items:
            $ref: '#/components/schemas/ContractFamily'
          readOnly: true
        current_terms:
          allOf:
          - $ref: '#/components/schemas/ContractTerms'
          nullable: true
          readOnly: true
        current_schedule:
          allOf:
          - $ref: '#/components/schemas/ContractSchedule'
          nullable: true
          readOnly: true
        paid_leave_balance:
          allOf:
          - $ref: '#/components/schemas/PaidLeaveBalance'
          readOnly: true
        recent_declarations:
          type: array
          items:
            $ref: '#/components/schemas/RecentDeclaration'
          readOnly: true
      required:
      - id
      - nanny
      - starting_date
      - ending_date
      - split_method
      - paid_leave_days
      - notes
      - families
      - current_terms
      - current_schedule
      - paid_leave_balance
      - recent_declarations
    DeclarationWarning:
      type: object
      description: |-
        One declaration warning: its code plus the rule behind it (may be absent).

        Documentation-only — the values are built as plain dicts in
        ``MonthlyDeclarationSerializer.get_warnings``; this shape drives the OpenAPI schema
        so the generated frontend type is precise instead of ``object``.
      properties:
        code:
          type: string
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/Source'
          readOnly: true
          nullable: true
      required:
      - code
      - source
    ExceptionalHours:
      type: object
      description: |-
        Hours beyond the schedule, filed by one family and read by all of them.

        ``family`` is never accepted from the payload — the viewset pins it to the
        acting family. A family may read the other's filings (its own hours depend on
        them) and must never write them.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        family:
          type: string
          format: uuid
          readOnly: true
        kind:
          $ref: '#/components/schemas/KindEnum'
        is_shared:
          type: boolean
        start_date:
          type: string
          format: date
        start_time:
          type: string
          format: time
        end_date:
          type: string
          format: date
        end_time:
          type: string
          format: time
        interventions:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
      required:
      - id
      - family
      - kind
      - is_shared
      - start_date
      - start_time
      - end_date
      - end_time
      - interventions
      - notes
    ExceptionalHoursRequest:
      type: object
      description: |-
        Hours beyond the schedule, filed by one family and read by all of them.

        ``family`` is never accepted from the payload — the viewset pins it to the
        acting family. A family may read the other's filings (its own hours depend on
        them) and must never write them.
      properties:
        kind:
          $ref: '#/components/schemas/KindEnum'
        is_shared:
          type: boolean
        start_date:
          type: string
          format: date
        start_time:
          type: string
          format: time
        end_date:
          type: string
          format: date
        end_time:
          type: string
          format: time
        interventions:
          type: integer
          maximum: 32767
          minimum: 0
        notes:
          type: string
      required:
      - end_date
      - end_time
      - start_date
      - start_time
    ExceptionalPresence:
      type: object
