  /families/{family_pk}/contracts/:
    get:
      operationId: families_contracts_list
      description: |-
        CRUD for the contracts shared with the acting family.

        Reads require family access; writes (financial/schedule data) require manage
        rights on the acting family.
      parameters:
      - in: path
        name: family_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - families
