      properties:
        net_hourly_rate:
          type: string
          nullable: true
      required:
      - net_hourly_rate
    MonthlyDeclaration:
      type: object
      description: |-
        The five numbers pajemploi asks for, and where they came from.

        Almost everything is read-only: it is computed, not typed. ``kilometers`` is
        the exception — mileage_rate's missing operand, which only a parent knows.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        family:
          type: string
          format: uuid
          readOnly: true
        family_name:
          type: string
          readOnly: true
        month:
          type: string
          format: date
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/MonthlyDeclarationStatusEnum'
          readOnly: true
        normal_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        hours_25:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        hours_50:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        net_salary:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        transport_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        benefits_in_kind_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        kilometers:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
        mileage_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        night_count:
          type: integer
          readOnly: true
        night_indemnity:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        holiday_majoration:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        paid_leave_rappel:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        paid_leave_tenth:
          allOf:
          - $ref: '#/components/schemas/TenthReconciliation'
          nullable: true
          readOnly: true
        paid_leave_compensatrice:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        net_hourly_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        gross_hourly_rate:
          type: string
          nullable: true
          readOnly: true
        night_presence_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          readOnly: true
        mileage_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,3})?$
          readOnly: true
        rate_periods:
          type: array
          items:
            $ref: '#/components/schemas/RatePeriod'
          readOnly: true
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/DeclarationWarning'
          readOnly: true
        computed_at:
          type: string
          format: date-time
          readOnly: true
        filed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_editable:
          type: boolean
          readOnly: true
        editable_until:
          type: string
          format: date
          readOnly: true
      required:
      - id
      - family
      - family_name
      - month
      - status
      - normal_hours
      - hours_25
      - hours_50
      - net_salary
      - total_amount
      - transport_amount
      - benefits_in_kind_amount
      - kilometers
      - mileage_amount
      - night_count
      - night_indemnity
      - holiday_majoration
      - paid_leave_rappel
      - paid_leave_tenth
      - paid_leave_compensatrice
      - net_hourly_rate
      - gross_hourly_rate
      - night_presence_rate
      - mileage_rate
      - rate_periods
      - warnings
      - computed_at
      - filed_at
      - is_editable
      - editable_until
    MonthlyDeclarationStatusEnum:
