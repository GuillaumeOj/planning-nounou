[tox]
env_list = py313, lint, type
requires =
    tox>=4.56
    tox-uv>=1.35

# All environments are built by tox-uv from uv.lock, so they match the pinned
# dependency set exactly (see pyproject.toml + uv.lock). Every env inherits runner and
# dependency_groups from [testenv].
#
# Docker work goes through scripts/dev_stack.py rather than a bare `docker compose` line.
# It pins the Compose project (nanny-development for the dev stack, nanny-tests for the test
# database) so both are identical from any git worktree, and it resolves the stack conflicts
# that pinning creates. It never removes a volume.

[testenv]
description = Run the test suite with pytest (starts the nanny-tests database)
runner = uv-venv-lock-runner
dependency_groups = dev
set_env =
    # Where the nanny-tests stack publishes Postgres — deliberately not the dev stack's
    # 5432, so running tests can never touch the dev database. CI sets DATABASE_URL itself
    # and calls pytest directly, so it starts no container.
    DATABASE_URL = {env:DATABASE_URL:postgres://nounou:nounou@localhost:5435/nounou}
commands =
    pytest {posargs}

# Only the test env needs a database. Declaring commands_pre here rather than in [testenv]
# keeps it opt-in: a new env can't start Docker by forgetting to clear it.
[testenv:py313]
commands_pre =
    python {tox_root}/scripts/dev_stack.py up --stack tests

[testenv:lint]
description = Lint with ruff
commands =
    ruff check {posargs:.}

[testenv:type]
description = Type-check the whole backend with ty (blocking)
commands =
    ty check {posargs}

[testenv:dev]
description = Start the whole dev stack (Postgres + Django + Vite) in Docker, then tail logs
commands =
    python {tox_root}/scripts/dev_stack.py up --stack development --logs

[testenv:dev-down]
description = Stop the dev stack (the database volume is kept)
commands =
    python {tox_root}/scripts/dev_stack.py down --stack development
