[tox]
env_list = py313, lint, type
requires =
    tox>=4.56
    tox-uv>=1.35

# All environments are built by tox-uv from uv.lock, so they match the pinned
# dependency set exactly (see pyproject.toml + uv.lock). Every env inherits runner and
# dependency_groups from [testenv].
#
# Docker work goes through scripts/dev_stack.py rather than a bare `docker compose` line.
# It pins the Compose project (mgs-development for the dev stack, mgs-tests for the test
# database) so both are identical from any git worktree, and it resolves the stack conflicts
# that pinning creates. It never removes a volume.

[testenv]
description = Run the test suite with pytest (starts the mgs-tests database)
runner = uv-venv-lock-runner
dependency_groups = dev
set_env =
    # Where the mgs-tests stack publishes Postgres — deliberately not the dev stack's
    # 5444, so running tests can never touch the dev database. CI sets DATABASE_URL itself
    # and calls pytest directly, so it starts no container.
    DATABASE_URL = {env:DATABASE_URL:postgres://mgs:mgs@localhost:5435/mgs}
commands =
    pytest {posargs}

# Only the test env needs a database. Declaring commands_pre here rather than in [testenv]
# keeps it opt-in: a new env can't start Docker by forgetting to clear it.
[testenv:py313]
commands_pre =
    python {tox_root}/scripts/dev_stack.py up --stack tests

[testenv:lint]
description = Lint with ruff
commands =
    ruff check {posargs:.}

[testenv:type]
description = Type-check the whole backend with ty (blocking)
commands =
    ty check {posargs}

[testenv:dev]
description = Start the whole dev stack (Postgres + Django + Vite) in Docker, then tail logs
commands =
    python {tox_root}/scripts/dev_stack.py up --stack development --logs

[testenv:dev-down]
description = Stop the dev stack (the database volume is kept)
commands =
    python {tox_root}/scripts/dev_stack.py down --stack development

[testenv:populate]
description = Fill the dev database with a demo dataset (accounts, families, contracts, plannings)
set_env =
    # The dev stack's Postgres, published on the host — NOT [testenv]'s test database on
    # 5435. This seeds the database you actually browse. Django runs here on the host, so
    # the address is localhost, not the `db` service name the web container uses.
    DATABASE_URL = {env:DATABASE_URL:postgres://mgs:mgs@localhost:5444/mgs}
    # populate_dev refuses to run with DEBUG off. The web container sets DEBUG for itself in
    # docker-compose.yml; nothing does on the host, so the dev-only marker is set here.
    DEBUG = {env:DEBUG:1}
# Brings the stack up if it isn't already (no-op when it is). `up --wait` gates on the web
# container's healthcheck, and that container migrates before it answers — so the schema is
# ready by the time populate_dev runs, without this env duplicating the migrate step.
commands_pre =
    python {tox_root}/scripts/dev_stack.py up --stack development
commands =
    python manage.py populate_dev {posargs}
